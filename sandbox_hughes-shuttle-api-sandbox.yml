name: Build and deploy Node.js project to Azure Function App - hughes-shuttle-api-sandbox
on:
  push:
    branches:
      - sandbox
  workflow_dispatch:
env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './api'
  NODE_VERSION: '22'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@v4
      - name: Setup Node Environment
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Resolve Project Dependencies Using Npm
        shell: bash
        run: |
          pushd '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          npm install
          npm run build --if-present
          npm run test --if-present
          popd
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          include-hidden-files: true
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B26087176C774779B3DD64CCB4647AE9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DA839223BF594D29B27B414C2FAE5369 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8061B574DDC54910B1E8FC9FD016FE07 }}
      - name: Run Azure Functions Action
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'hughes-shuttle-api-sandbox'
          slot-name: 'Production'
          package: '.'
